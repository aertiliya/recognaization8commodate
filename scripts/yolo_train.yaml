# YOLO11 商品检测数据集配置文件
# 用于YOLO训练，请勿用于X AnyLabeling

# 数据集路径 (Kaggle环境)
path: /kaggle/working/yolo_dataset  # 数据集根目录
train: /kaggle/working/yolo_dataset/images/train  # 训练集图像路径
val: /kaggle/working/yolo_dataset/images/val      # 验证集图像路径

test:           # 测试集路径 (可选，相对于path)

# 类别数量
nc: 8

# 类别名称
names:
  0: hks_large
  1: hks_small
  2: hn_can
  3: jlb_can
  4: kkkl_can
  5: wlj_can
  6: xb_wt
  7: xb
